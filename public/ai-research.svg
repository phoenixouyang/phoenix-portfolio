<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Research paper graphic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dce9f7"/>
      <stop offset="55%" stop-color="#e4def5"/>
      <stop offset="100%" stop-color="#f3cfe3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="55%" stop-color="#9d7bea"/>
      <stop offset="100%" stop-color="#e98fc4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- paper -->
  <g transform="translate(280 90)">
    <rect x="8" y="12" width="240" height="320" rx="12" fill="#16283C" opacity="0.12"/>
    <rect width="240" height="320" rx="12" fill="#ffffff"/>
    <rect x="28" y="36" width="120" height="14" rx="7" fill="url(#accent)"/>
    <rect x="28" y="72" width="184" height="8" rx="4" fill="#B1CBE6"/>
    <rect x="28" y="92" width="184" height="8" rx="4" fill="#B1CBE6"/>
    <rect x="28" y="112" width="140" height="8" rx="4" fill="#B1CBE6"/>
    <!-- bar chart on the paper -->
    <rect x="28" y="160" width="28" height="120" rx="6" fill="#5b8def"/>
    <rect x="68" y="200" width="28" height="80" rx="6" fill="#9d7bea"/>
    <rect x="108" y="180" width="28" height="100" rx="6" fill="#e98fc4"/>
    <rect x="148" y="220" width="28" height="60" rx="6" fill="#B1CBE6"/>
  </g>
  <!-- magnifying glass -->
  <g transform="translate(490 270)">
    <circle cx="60" cy="60" r="58" fill="#ffffff" opacity="0.55"/>
    <circle cx="60" cy="60" r="58" fill="none" stroke="url(#accent)" stroke-width="14"/>
    <line x1="104" y1="104" x2="160" y2="160" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>
